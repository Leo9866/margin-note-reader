# /etc/nginx/conf.d/reader.youbeat.cn.conf
#
# This site is served by PM2 on 127.0.0.1:3001.
# Keep it separate from the existing www.youbeat.cn app on 127.0.0.1:3000.

server {
    listen 80;
    listen [::]:80;
    server_name reader.youbeat.cn;

    client_max_body_size 25m;

    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI answers are streamed with Server-Sent Events.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
